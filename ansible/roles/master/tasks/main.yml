- name: Include common setup tasks
  include_tasks: "roles/common/tasks/main.yml"

- name: Copy systemd service file for containerd
  ansible.builtin.template:
    src: "roles/common/templates/containerd.service.j2"
    dest: /etc/systemd/system/containerd.service
    notify:
      - Reload systemd
      - Restart containerd
  become: true

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install specific version of Kubernetes packages (kubeadm, kubelet, kubectl)
  ansible.builtin.apt:
    name: "{{ item }}=1.29.*"
    state: present
    update_cache: yes
  loop:
    - kubeadm
    - kubelet
    - kubectl
  ignore_errors: yes

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot the system if required
  ansible.builtin.reboot:
    msg: "Rebooting because of significant system changes"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 60
    test_command: uptime
  when: reboot_required.stat.exists


- name: Print Current Playbook Structure
  ansible.builtin.debug:
    var: play_hosts



